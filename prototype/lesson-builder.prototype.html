<!DOCTYPE html>
<!--
  THROWAWAY PROTOTYPE — билдер урока (UX-макет, не продакшен).
  Вопрос: какая раскладка степ-листа удобнее автору?
  3 варианта через ?variant=A|B|C + плавающий переключатель снизу (← → / стрелки клавиатуры).
  Стейт в памяти, сбрасывается на reload. Открыть:
    http://localhost:8080/wp-content/plugins/fs-lms/prototype/lesson-builder.prototype.html
  Вердикт по выбору — в prototype/NOTES.md. Удалить после переноса решения в код.
-->
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Прототип · Билдер урока</title>
<style>
  :root{
    --bg:#f0f0f1; --panel:#fff; --bd:#c3c4c7; --bd-soft:#dcdcde;
    --ink:#1d2327; --muted:#646970; --accent:#2271b1; --accent-soft:#f0f6fc;
    --danger:#d63638; --ok:#2a8a3e; --radius:6px; --sh:0 1px 2px rgba(0,0,0,.06);
    --t-text:#3858e9; --t-video:#8a2be2; --t-material:#0a7c83; --t-task:#b26a00; --t-work:#2a8a3e; --t-assessment:#d63638;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg)}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 24px 120px}
  h1{font-size:21px;margin:0}
  .crumbs{color:var(--muted);font-size:13px;margin:2px 0 18px}
  .crumbs b{color:var(--ink);font-weight:600}
  .crumbs .sep{margin:0 6px;opacity:.6}
  .muted{color:var(--muted)}
  button{font:inherit;cursor:pointer}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:4px;padding:6px 12px}
  .btn.ghost{background:#fff;color:var(--accent)}
  .btn.sm{padding:3px 9px;font-size:12px}
  .btn.block{display:block;width:100%;padding:10px;border-style:dashed;background:#fff;color:var(--accent)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:#eef;color:#333}
  .variant-note{background:var(--accent-soft);border:1px solid #c5d9ec;border-radius:var(--radius);padding:9px 13px;margin:0 0 16px;font-size:13px;color:#0a4b78}

  /* step type chips */
  .ico{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto}
  .badge{font-size:11px;font-weight:600;padding:1px 7px;border-radius:4px}
  .t-text{background:rgba(56,88,233,.12);color:var(--t-text)}
  .t-video{background:rgba(138,43,226,.12);color:var(--t-video)}
  .t-material{background:rgba(10,124,131,.12);color:var(--t-material)}
  .t-task{background:rgba(178,106,0,.14);color:var(--t-task)}
  .t-work{background:rgba(42,138,62,.13);color:var(--t-work)}
  .t-assessment{background:rgba(214,54,56,.12);color:var(--t-assessment)}

  /* === Variant A : single column === */
  .stepcard{background:var(--panel);border:1px solid var(--bd);border-radius:var(--radius);box-shadow:var(--sh);margin:0 0 10px;overflow:hidden}
  .stepcard.dragover{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .stephead{display:flex;align-items:center;gap:10px;padding:11px 12px}
  .grip{cursor:grab;color:#b0b3b8;font-size:16px;user-select:none}
  .stepnum{font-size:12px;color:var(--muted);width:18px;text-align:center}
  .steptitle{font-weight:600;flex:1;outline:none}
  .steptitle[contenteditable]:focus{box-shadow:0 0 0 2px var(--accent-soft);border-radius:3px}
  .stepacts{display:flex;gap:6px;align-items:center}
  .iconbtn{border:1px solid var(--bd);background:#fff;border-radius:4px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted)}
  .iconbtn:hover{color:var(--danger);border-color:var(--danger)}
  .stepbody{padding:0 12px 12px 46px}
  .ta{width:100%;border:1px solid var(--bd);border-radius:4px;padding:8px;font:inherit;resize:vertical;min-height:62px}
  .urlrow{display:flex;gap:8px}.urlrow input{flex:1;border:1px solid var(--bd);border-radius:4px;padding:7px}
  .vidprev{margin-top:8px;height:120px;border:1px dashed var(--bd);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:#fafafa}
  .reflist{border:1px solid var(--bd-soft);border-radius:6px;margin-top:4px;background:#fcfcfd}
  .refrow{display:flex;align-items:center;gap:9px;padding:7px 11px;border-top:1px solid var(--bd-soft);font-size:13px}
  .refrow:first-child{border-top:0}
  .refrow .n{color:var(--muted);width:20px;font-size:12px}
  .settings{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);padding:8px 11px;border-top:1px solid var(--bd-soft);background:#fff}
  .settings b{color:var(--ink)}
  .expander{cursor:pointer;user-select:none;color:var(--muted)}

  /* === Variant B : two-pane === */
  .twopane{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
  .rail{background:var(--panel);border:1px solid var(--bd);border-radius:var(--radius);box-shadow:var(--sh);overflow:hidden}
  .railrow{display:flex;align-items:center;gap:9px;padding:9px 11px;border-top:1px solid var(--bd-soft);cursor:pointer}
  .railrow:first-child{border-top:0}
  .railrow.active{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
  .railrow .rt{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .railrow .n{color:var(--muted);font-size:12px;width:16px}
  .editor{background:var(--panel);border:1px solid var(--bd);border-radius:var(--radius);box-shadow:var(--sh);padding:18px;min-height:340px}
  .editor h3{margin:0 0 4px;display:flex;align-items:center;gap:9px}
  .field{margin:14px 0}.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}

  /* === Variant C : course outline === */
  .tree{background:var(--panel);border:1px solid var(--bd);border-radius:var(--radius);box-shadow:var(--sh);overflow:hidden}
  .mod{border-top:1px solid var(--bd-soft)}.mod:first-child{border-top:0}
  .modhead{display:flex;align-items:center;gap:9px;padding:11px 13px;background:#f6f7f7;font-weight:600}
  .modhead .cnt{margin-left:auto;font-size:12px;color:var(--muted);font-weight:400}
  .lesson{border-top:1px solid var(--bd-soft)}
  .lhead{display:flex;align-items:center;gap:9px;padding:9px 13px 9px 30px;cursor:pointer}
  .lhead:hover{background:#fafafa}
  .lhead .lt{flex:1;font-weight:500}
  .lhead.active{background:var(--accent-soft)}
  .lsteps{padding:4px 13px 12px 52px;background:#fcfcfd;border-top:1px dashed var(--bd-soft)}
  .srow{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:5px}
  .srow:hover{background:#fff}
  .srow .st{flex:1}
  .caret{transition:transform .15s;display:inline-block;color:var(--muted)}
  .caret.open{transform:rotate(90deg)}

  /* modal */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:50}
  .ov.on{display:flex}
  .modal{background:#fff;border-radius:10px;width:520px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
  .mhead{display:flex;align-items:center;padding:15px 18px;border-bottom:1px solid var(--bd-soft)}
  .mhead h3{margin:0;font-size:16px;flex:1}
  .mhead .x{border:0;background:none;font-size:20px;color:var(--muted)}
  .mbody{padding:18px}
  .typegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .typebtn{display:flex;align-items:center;gap:11px;padding:13px;border:1px solid var(--bd);border-radius:8px;background:#fff;text-align:left}
  .typebtn:hover{border-color:var(--accent);background:var(--accent-soft)}
  .typebtn .tn{font-weight:600}.typebtn .td{font-size:12px;color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--bd);border-radius:6px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:7px 14px;color:var(--muted)}
  .seg button.on{background:var(--accent);color:#fff}
  .sel{width:100%;padding:8px;border:1px solid var(--bd);border-radius:5px;font:inherit}
  .mfoot{display:flex;gap:10px;justify-content:flex-end;padding:14px 18px;border-top:1px solid var(--bd-soft);background:#fafafa}
  .back{margin-right:auto;background:none;border:0;color:var(--muted)}

  /* switcher */
  .switch{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:99;display:flex;align-items:center;gap:4px;background:#1d2327;color:#fff;border-radius:999px;padding:6px 8px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
  .switch button{border:0;background:#3a3f45;color:#fff;width:30px;height:30px;border-radius:50%;font-size:15px}
  .switch button:hover{background:var(--accent)}
  .switch .lbl{padding:0 12px;font-size:13px;font-weight:600;white-space:nowrap}
  .switch .lbl small{display:block;font-weight:400;opacity:.7;font-size:11px}
  details.json{margin-top:18px}details.json summary{cursor:pointer;color:var(--muted);font-size:12px}
  pre{background:#1d2327;color:#c3e88d;padding:12px;border-radius:6px;overflow:auto;font-size:12px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div class="switch" id="switch"></div>

<script>
// ---------- meta ----------
const TYPE = {
  text:      {icon:'📝',label:'Текст',       cls:'t-text',       desc:'Теория, объяснение'},
  video:     {icon:'🎬',label:'Видео',       cls:'t-video',      desc:'Запись или внешний ролик'},
  material:  {icon:'📎',label:'Материал',    cls:'t-material',   desc:'PDF, презентация, статья'},
  task:      {icon:'✏️',label:'Задача',      cls:'t-task',       desc:'Самопроверка, без сдачи'},
  work:      {icon:'🏠',label:'Работа',      cls:'t-work',       desc:'Домашка: сдача + грейдбук'},
  assessment:{icon:'🎓',label:'Контрольная', cls:'t-assessment', desc:'Экзамен: таймер, попытки'},
};
const INTERACTION = {choice:'Выбор ответа',checkbox:'Чекбоксы',code:'Программирование',file:'Задача с файлом'};
let _k=0; const key=()=> 's'+(++_k);
const tasks = (n,types)=> Array.from({length:n},(_,i)=>({key:key(),title:`Задача ${i+1}`,interaction:types[i%types.length]}));

// ---------- demo state ----------
const state = {
  course:'ЕГЭ по информатике',
  modules:[{ id:'m1', title:'Задание 7', lessons:[
    {id:'l1',title:'О задании',steps:[
      {key:key(),type:'text',title:'Что проверяет задание 7',body:'Кодирование информации, степени двойки, единицы измерения.'}
    ]},
    {id:'l2',title:'Кодирование',steps:[
      {key:key(),type:'text',title:'Биты, байты, степени двойки',body:''},
      {key:key(),type:'video',title:'Видеоразбор темы',url:'https://youtu.be/xxxx'}
    ]},
    {id:'l3',title:'Решение 7 заданий, тип 1',steps:[
      {key:key(),type:'text',title:'Алгоритм решения',body:''},
      {key:key(),type:'task',title:'Тренируемся: тип 1',interaction:'choice',source:'subject'}
    ]},
    {id:'l4',title:'Решение 7 заданий, тип 2',steps:[
      {key:key(),type:'text',title:'Разбор второго типа',body:''},
      {key:key(),type:'work',title:'Домашняя работа по типу 2',timer:null,attempts:'∞',tasks:tasks(3,['choice','code','file'])}
    ]},
    {id:'l5',title:'Контрольная по 7 заданиям',steps:[
      {key:key(),type:'text',title:'Описание контрольной',body:'40 минут, 12 заданий, одна попытка. Результат — в журнал.'},
      {key:key(),type:'assessment',title:'Контрольная: задание 7',timer:'40 мин',attempts:'1',tasks:tasks(12,['choice','checkbox','code','file'])}
    ]},
  ]}]
};
const ui = { lessonId:'l5', selStep:null, expanded:new Set(), openLessons:new Set(['l5']) };

// ---------- helpers ----------
const $=(s,r=document)=>r.querySelector(s);
const el=(h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};
const lessonById=(id)=>{for(const m of state.modules){const l=m.lessons.find(x=>x.id===id);if(l)return l;}};
const moduleOf=(id)=>state.modules.find(m=>m.lessons.some(l=>l.id===id));
function chip(t){const m=TYPE[t];return `<span class="ico ${m.cls}">${m.icon}</span>`;}
function subtitle(s){
  if(s.type==='task')return `${INTERACTION[s.interaction]} · ${s.source==='bank'?'банк сайта':'мои'}`;
  if(s.type==='work'||s.type==='assessment')return `${s.tasks.length} задач${s.timer?' · '+s.timer:''}${s.attempts?' · попыток '+s.attempts:''}`;
  if(s.type==='video')return s.url||'url не задан';
  if(s.type==='material')return 'вложение / статья';
  return s.body?s.body.slice(0,60)+(s.body.length>60?'…':''):'пусто';
}

// ---------- mutations ----------
function addStep(lessonId,type,extra={}){
  const s={key:key(),type,title:TYPE[type].label+' — новый шаг',...extra};
  if(type==='work'||type==='assessment'){s.tasks=s.tasks||[];s.timer=s.timer||(type==='assessment'?'30 мин':null);s.attempts=s.attempts||(type==='assessment'?'1':'∞');}
  if(type==='text')s.body='';if(type==='video')s.url='';
  lessonById(lessonId).steps.push(s);ui.selStep=s.key;render();
}
function removeStep(lessonId,k){const l=lessonById(lessonId);l.steps=l.steps.filter(s=>s.key!==k);render();}
function move(arr,from,to){const[x]=arr.splice(from,1);arr.splice(to,0,x);}

// ---------- drag/drop on a list ----------
function dnd(container,arr,onDone){
  let from=null;
  container.querySelectorAll('[data-i]').forEach(row=>{
    row.draggable=true;
    row.addEventListener('dragstart',e=>{from=+row.dataset.i;e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragover',e=>{e.preventDefault();row.classList.add('dragover');});
    row.addEventListener('dragleave',()=>row.classList.remove('dragover'));
    row.addEventListener('drop',e=>{e.preventDefault();const to=+row.dataset.i;if(from!=null&&from!==to){move(arr,from,to);onDone();}});
  });
}

// ========== VARIANT A — лента шагов ==========
function renderA(root){
  const l=lessonById(ui.lessonId),m=moduleOf(ui.lessonId);
  root.appendChild(el(`<div><h1>${l.title}</h1>
    <div class="crumbs">Курс <b>${state.course}</b><span class="sep">›</span>Модуль <b>${m.title}</b><span class="sep">›</span>Урок <b>${l.title}</b></div>
    <div class="variant-note"><b>A · Лента шагов.</b> Одна колонка, правка прямо в карточке — как лента Stepik. Хорошо для линейного прохождения, видно весь поток сразу.</div>
  </div>`));
  const list=el(`<div id="list"></div>`);
  l.steps.forEach((s,i)=>list.appendChild(cardA(l,s,i)));
  root.appendChild(list);
  root.appendChild(el(`<button class="btn block" id="add">+ Добавить шаг</button>`));
  $('#add',root).onclick=()=>openAddModal(l.id);
  dnd(list,l.steps,render);
}
function cardA(l,s,i){
  const m=TYPE[s.type], ref=(s.type==='work'||s.type==='assessment'), open=ui.expanded.has(s.key);
  const c=el(`<div class="stepcard" data-i="${i}">
    <div class="stephead">
      <span class="grip">⠿</span><span class="stepnum">${i+1}</span>
      <span class="ico ${m.cls}">${m.icon}</span>
      <span class="badge ${m.cls}">${m.label}</span>
      <span class="steptitle" contenteditable>${s.title}</span>
      ${ref?`<span class="expander" data-x>${open?'▾ свернуть':'▸ задачи ('+s.tasks.length+')'}</span>`:''}
      <span class="stepacts"><button class="iconbtn" data-del title="удалить">✕</button></span>
    </div>
    <div class="bodyslot"></div>
  </div>`);
  c.querySelector('.steptitle').onblur=e=>{s.title=e.target.textContent.trim();};
  c.querySelector('[data-del]').onclick=()=>removeStep(l.id,s.key);
  const slot=c.querySelector('.bodyslot');
  if(s.type==='text')slot.appendChild(el(`<div class="stepbody"><textarea class="ta" placeholder="Текст теории…">${s.body||''}</textarea></div>`)),slot.querySelector('textarea').onblur=e=>s.body=e.target.value;
  if(s.type==='video'){slot.appendChild(el(`<div class="stepbody"><div class="urlrow"><input value="${s.url||''}" placeholder="https://… (или подставится запись из S3)"></div><div class="vidprev">🎬 превью видео</div></div>`));slot.querySelector('input').onblur=e=>s.url=e.target.value;}
  if(s.type==='material')slot.appendChild(el(`<div class="stepbody"><div class="reflist"><div class="refrow">📎 attachment / статья из банка — заглушка</div></div></div>`));
  if(ref&&open)slot.appendChild(refBlock(s));
  if(ref){c.querySelector('[data-x]').onclick=()=>{open?ui.expanded.delete(s.key):ui.expanded.add(s.key);render();};}
  return c;
}
function refBlock(s){
  const b=el(`<div class="stepbody"></div>`);
  const set=el(`<div class="reflist"></div>`);
  set.appendChild(el(`<div class="settings">${s.timer?`⏱ <b>${s.timer}</b>`:''} Попыток: <b>${s.attempts}</b> · Источник баллов: <b>${s.type==='assessment'?'попытки':'сдачи'}</b></div>`));
  s.tasks.forEach((t,i)=>set.appendChild(el(`<div class="refrow"><span class="n">${i+1}</span>${chip('task')}<span style="flex:1">${t.title}</span><span class="muted">${INTERACTION[t.interaction]}</span></div>`)));
  b.appendChild(set);return b;
}

// ========== VARIANT B — мастер-деталь ==========
function renderB(root){
  const l=lessonById(ui.lessonId),m=moduleOf(ui.lessonId);
  if(!ui.selStep||!l.steps.some(s=>s.key===ui.selStep))ui.selStep=l.steps[0]?.key;
  root.appendChild(el(`<div><h1>${l.title}</h1>
    <div class="crumbs">Курс <b>${state.course}</b><span class="sep">›</span>Модуль <b>${m.title}</b><span class="sep">›</span>Урок <b>${l.title}</b></div>
    <div class="variant-note"><b>B · Мастер-деталь.</b> Слева тонкий список шагов, справа редактор выбранного. Меньше скролла на длинном уроке, удобно «допиливать» один шаг.</div>
  </div>`));
  const pane=el(`<div class="twopane"></div>`);
  const rail=el(`<div class="rail" id="rail"></div>`);
  l.steps.forEach((s,i)=>{
    const r=el(`<div class="railrow ${s.key===ui.selStep?'active':''}" data-i="${i}"><span class="n">${i+1}</span>${chip(s.type)}<span class="rt">${s.title}</span></div>`);
    r.onclick=()=>{ui.selStep=s.key;render();};
    rail.appendChild(r);
  });
  rail.appendChild(el(`<div class="railrow" style="color:var(--accent);justify-content:center;font-weight:600" id="add">+ шаг</div>`));
  pane.appendChild(rail);
  pane.appendChild(editorB(l,l.steps.find(s=>s.key===ui.selStep)));
  root.appendChild(pane);
  $('#add',rail).onclick=()=>openAddModal(l.id);
  dnd(rail,l.steps,render);
}
function editorB(l,s){
  if(!s)return el(`<div class="editor muted">Нет шагов. Добавьте первый.</div>`);
  const m=TYPE[s.type];
  const e=el(`<div class="editor"><h3>${chip(s.type)}<span class="badge ${m.cls}">${m.label}</span></h3>
    <div class="field"><label>Заголовок шага</label><input class="ta" id="ti" value="${s.title}" style="min-height:auto"></div>
    <div id="slot"></div>
    <div style="margin-top:18px"><button class="btn ghost sm" id="del">Удалить шаг</button></div>
  </div>`);
  e.querySelector('#ti').onblur=ev=>{s.title=ev.target.value;render();};
  e.querySelector('#del').onclick=()=>removeStep(l.id,s.key);
  const slot=e.querySelector('#slot');
  if(s.type==='text')slot.appendChild(el(`<div class="field"><label>Теория</label><textarea class="ta" style="min-height:160px">${s.body||''}</textarea></div>`)),slot.querySelector('textarea').onblur=ev=>s.body=ev.target.value;
  if(s.type==='video')slot.appendChild(el(`<div class="field"><label>URL видео <span class="muted">(или запись из S3 — позже)</span></label><input class="ta" style="min-height:auto" value="${s.url||''}"><div class="vidprev">🎬 превью</div></div>`));
  if(s.type==='task')slot.appendChild(el(`<div class="field"><label>Задача</label><div class="reflist"><div class="refrow">${chip('task')}<span style="flex:1">${INTERACTION[s.interaction]}</span><span class="muted">${s.source==='bank'?'банк сайта':'мои'}</span><button class="btn ghost sm">Заменить</button></div></div></div>`));
  if(s.type==='work'||s.type==='assessment'){
    const f=el(`<div class="field"><label>Состав (${s.tasks.length} задач) · ${s.timer?'⏱ '+s.timer+' · ':''}попыток ${s.attempts}</label><div class="reflist" id="rl"></div><button class="btn ghost sm" style="margin-top:8px">+ задача</button></div>`);
    s.tasks.forEach((t,i)=>f.querySelector('#rl').appendChild(el(`<div class="refrow"><span class="n">${i+1}</span>${chip('task')}<span style="flex:1">${t.title}</span><span class="muted">${INTERACTION[t.interaction]}</span></div>`)));
    slot.appendChild(f);
  }
  if(s.type==='material')slot.appendChild(el(`<div class="field"><label>Материал</label><div class="vidprev">📎 загрузка файла / выбор статьи</div></div>`));
  return e;
}

// ========== VARIANT C — структура курса ==========
function renderC(root){
  root.appendChild(el(`<div><h1>${state.course}</h1>
    <div class="crumbs">Сборка всего курса: <b>модули → уроки → шаги</b></div>
    <div class="variant-note"><b>C · Структура курса.</b> Целиком дерево курса. Видно архитектуру и баланс модулей; шаги — плотными строками. Удобно тасовать уроки между модулями и держать общую картину.</div>
  </div>`));
  const tree=el(`<div class="tree"></div>`);
  state.modules.forEach(m=>{
    const mod=el(`<div class="mod"><div class="modhead">📦 <span>${m.title}</span><span class="cnt">${m.lessons.length} уроков</span><button class="btn ghost sm" style="margin-left:10px">+ урок</button></div></div>`);
    m.lessons.forEach(l=>{
      const open=ui.openLessons.has(l.id);
      const lh=el(`<div class="lesson"><div class="lhead ${l.id===ui.lessonId?'active':''}"><span class="caret ${open?'open':''}">▸</span><span class="lt">${l.title}</span><span class="muted" style="font-size:12px">${l.steps.length} шагов</span></div></div>`);
      lh.querySelector('.lhead').onclick=()=>{open?ui.openLessons.delete(l.id):ui.openLessons.add(l.id);ui.lessonId=l.id;render();};
      if(open){
        const box=el(`<div class="lsteps" id="ls"></div>`);
        l.steps.forEach((s,i)=>{
          const ref=(s.type==='work'||s.type==='assessment'),ex=ui.expanded.has(s.key);
          const row=el(`<div data-i="${i}"><div class="srow"><span class="grip">⠿</span>${chip(s.type)}<span class="st">${s.title}</span><span class="muted" style="font-size:12px">${subtitle(s)}</span>${ref?`<span class="expander" data-x>${ex?'▾':'▸'}</span>`:''}</div></div>`);
          if(ref){row.querySelector('[data-x]').onclick=()=>{ex?ui.expanded.delete(s.key):ui.expanded.add(s.key);render();};
            if(ex){const inner=el(`<div style="padding:2px 0 8px 30px"></div>`);s.tasks.forEach((t,j)=>inner.appendChild(el(`<div class="srow"><span class="muted" style="width:18px">${j+1}</span>${chip('task')}<span class="st">${t.title}</span><span class="muted" style="font-size:12px">${INTERACTION[t.interaction]}</span></div>`)));row.appendChild(inner);}
          }
          box.appendChild(row);
        });
        box.appendChild(el(`<button class="btn block sm" style="margin-top:6px;padding:7px" id="add">+ шаг в «${l.title}»</button>`));
        box.querySelector('#add').onclick=()=>openAddModal(l.id);
        dnd(box,l.steps,render);
        lh.appendChild(box);
      }
      mod.appendChild(lh);
    });
    tree.appendChild(mod);
  });
  root.appendChild(tree);
  root.appendChild(el(`<button class="btn ghost" style="margin-top:12px">+ Добавить модуль</button>`));
}

// ---------- add-step modal ----------
function openAddModal(lessonId){
  const ov=$('#ov'),mo=$('#modal');
  function close(){ov.classList.remove('on');}
  function step1(){
    mo.innerHTML='';
    mo.appendChild(el(`<div class="mhead"><h3>Добавить шаг</h3><button class="x">×</button></div>`));
    const body=el(`<div class="mbody"><div class="typegrid"></div></div>`);
    Object.entries(TYPE).forEach(([t,m])=>{
      const b=el(`<button class="typebtn"><span class="ico ${m.cls}">${m.icon}</span><span><span class="tn">${m.label}</span><br><span class="td">${m.desc}</span></span></button>`);
      b.onclick=()=>{ if(t==='task')step2task(); else if(t==='work'||t==='assessment')step2ref(t); else {addStep(lessonId,t);close();} };
      body.querySelector('.typegrid').appendChild(b);
    });
    mo.appendChild(body);
    mo.querySelector('.x').onclick=close;
  }
  function step2task(){
    let source='subject',inter='choice';
    mo.innerHTML='';
    mo.appendChild(el(`<div class="mhead"><h3>✏️ Задача</h3><button class="x">×</button></div>`));
    const body=el(`<div class="mbody">
      <div class="field"><label>Источник</label><div class="seg" id="src"><button data-v="subject" class="on">Мои (приватные)</button><button data-v="bank">Банк сайта</button></div></div>
      <div class="field"><label>Тип задачи (из реестра шаблонов)</label><select class="sel" id="it">${Object.entries(INTERACTION).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div>
      <div class="muted" style="font-size:12px">Механизм один; «мои» и «банк сайта» отличаются только видимостью.</div>
    </div>`);
    mo.appendChild(body);
    mo.appendChild(el(`<div class="mfoot"><button class="back">← назад</button><button class="btn ghost" id="lib">Выбрать из библиотеки</button><button class="btn" id="new">Создать новую</button></div>`));
    body.querySelectorAll('#src button').forEach(b=>b.onclick=()=>{source=b.dataset.v;body.querySelectorAll('#src button').forEach(x=>x.classList.toggle('on',x===b));});
    body.querySelector('#it').onchange=e=>inter=e.target.value;
    mo.querySelector('.back').onclick=step1;mo.querySelector('.x').onclick=close;
    const add=()=>{addStep(lessonId,'task',{interaction:inter,source,title:INTERACTION[inter]+' — задача'});close();};
    mo.querySelector('#lib').onclick=add;mo.querySelector('#new').onclick=add;
  }
  function step2ref(t){
    mo.innerHTML='';
    mo.appendChild(el(`<div class="mhead"><h3>${TYPE[t].icon} ${TYPE[t].label}</h3><button class="x">×</button></div>`));
    mo.appendChild(el(`<div class="mbody"><div class="muted" style="margin-bottom:10px">Оцениваемый блок: внутри — последовательность задач-шагов, со сдачей${t==='assessment'?'/таймером':''}.</div>
      <div class="reflist"><div class="refrow">${TYPE[t].icon} «${t==='assessment'?'Контрольная: задание 7':'Домашняя работа'}» <span class="muted" style="margin-left:auto">из банка</span></div></div></div>`));
    mo.appendChild(el(`<div class="mfoot"><button class="back">← назад</button><button class="btn ghost" id="bank">Выбрать из банка</button><button class="btn" id="new">Создать новую</button></div>`));
    mo.querySelector('.back').onclick=step1;mo.querySelector('.x').onclick=close;
    const add=()=>{addStep(lessonId,t,{title:(t==='assessment'?'Контрольная':'Работа')+' — новая',tasks:tasks(t==='assessment'?12:3,['choice','checkbox','code','file'])});close();};
    mo.querySelector('#bank').onclick=add;mo.querySelector('#new').onclick=add;
  }
  step1();ov.classList.add('on');
}

// ---------- router + switcher ----------
const VARIANTS={A:{fn:renderA,name:'Лента шагов'},B:{fn:renderB,name:'Мастер-деталь'},C:{fn:renderC,name:'Структура курса'}};
function curVariant(){const v=new URLSearchParams(location.search).get('variant');return VARIANTS[v]?v:'A';}
function render(){
  const v=curVariant(),app=$('#app');app.innerHTML='';VARIANTS[v].fn(app);
  app.appendChild(el(`<details class="json"><summary>посмотреть стейт урока (JSON)</summary><pre>${JSON.stringify(lessonById(ui.lessonId),null,2)}</pre></details>`));
  buildSwitch(v);
}
function setVariant(v){const u=new URL(location);u.searchParams.set('variant',v);history.replaceState(null,'',u);render();}
function buildSwitch(v){
  const keys=Object.keys(VARIANTS),i=keys.indexOf(v);
  const s=$('#switch');s.innerHTML='';
  const prev=el(`<button title="←">‹</button>`),next=el(`<button title="→">›</button>`);
  prev.onclick=()=>setVariant(keys[(i-1+keys.length)%keys.length]);
  next.onclick=()=>setVariant(keys[(i+1)%keys.length]);
  s.append(prev,el(`<span class="lbl">${v} — ${VARIANTS[v].name}<small>прототип · ?variant=${v}</small></span>`),next);
}
document.addEventListener('keydown',e=>{
  if(/^(INPUT|TEXTAREA)$/.test(e.target.tagName)||e.target.isContentEditable)return;
  const keys=Object.keys(VARIANTS),i=keys.indexOf(curVariant());
  if(e.key==='ArrowLeft')setVariant(keys[(i-1+keys.length)%keys.length]);
  if(e.key==='ArrowRight')setVariant(keys[(i+1)%keys.length]);
});
render();
</script>
