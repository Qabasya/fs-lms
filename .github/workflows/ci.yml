name: CI

on:
  push:
  pull_request:

jobs:
  assets:
    name: Lint JS + build styles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:js
      # GUARD: падает, если любой SCSS-бандл не собирается (см. styles:check в gulpfile).
      - run: npm run build:check

  tests:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: vendor/bin/phpunit
