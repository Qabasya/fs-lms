<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LMS — Страница задания</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="lms-variants.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e8e5de; }
    #root { height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#1a56a0",
      "showSolution": true,
      "density": "compact"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <>
          <DesignCanvas>
            <DCSection
              id="s1"
              title="Страница задания — LMS WordPress Plugin"
              subtitle="3 варианта раскладки · академический стиль · русский язык"
            >
              <DCArtboard id="va" label="A — Два столбца" width={1280} height={1420}>
                <VariantA accent={t.accent} showSolution={t.showSolution} density={t.density} />
              </DCArtboard>
              <DCArtboard id="vb" label="B — Документальный" width={1280} height={1340}>
                <VariantB accent={t.accent} showSolution={t.showSolution} density={t.density} />
              </DCArtboard>
              <DCArtboard id="vc" label="C — Боковая панель" width={1280} height={1260}>
                <VariantC accent={t.accent} showSolution={t.showSolution} density={t.density} />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel>
            <TweakSection label="Акцентный цвет" />
            <TweakColor
              label="Цвет"
              value={t.accent}
              options={["#1a56a0", "#2d6a4f", "#7c3aed", "#b45309"]}
              onChange={v => setTweak("accent", v)}
            />
            <TweakSection label="Содержание" />
            <TweakToggle
              label="Показывать решение"
              value={t.showSolution}
              onChange={v => setTweak("showSolution", v)}
            />
            <TweakSection label="Плотность" />
            <TweakRadio
              label="Компактность"
              value={t.density}
              options={["compact", "normal", "spacious"]}
              onChange={v => setTweak("density", v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
