<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Личный кабинет преподавателя — LMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cabinet.css">
<link rel="stylesheet" href="cabinet-journal.css">
<style>
  /* Tweaks panel */
  .twk { position: fixed; right: 16px; bottom: 16px; width: 264px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow-lg); z-index: 500;
    display: none; overflow: hidden; font-family: var(--font); }
  .twk.open { display: block; }
  .twk-hd { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--line-2); }
  .twk-hd b { font-size: 13px; font-weight: 700; }
  .twk-x { border: none; background: transparent; color: var(--muted-2); cursor: pointer; width: 24px; height: 24px; border-radius: 6px; font-size: 12px; }
  .twk-x:hover { background: var(--surface-2); color: var(--ink); }
  .twk-body { padding: 4px 14px 16px; display: flex; flex-direction: column; }
  .twk-sec { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted-2); margin: 14px 0 8px; }
  .twk-swatches { display: flex; gap: 8px; }
  .twk-sw { width: 32px; height: 32px; border-radius: 9px; border: 2px solid transparent; cursor: pointer; box-shadow: var(--shadow-sm); position: relative; }
  .twk-sw.on { border-color: var(--ink); }
  .twk-sw.on::after { content: ""; position: absolute; inset: 0; border: 2px solid #fff; border-radius: 6px; }
  .twk-seg { display: flex; gap: 4px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 9px; padding: 3px; }
  .twk-seg button { flex: 1; border: none; background: transparent; padding: 7px 4px; border-radius: 6px; font: 600 11.5px var(--font); color: var(--muted); cursor: pointer; transition: all .12s; }
  .twk-seg button.on { background: var(--surface); color: var(--accent-700); box-shadow: var(--shadow-sm); }
  .twk-seg-letters button { padding: 7px 0; font-size: 12.5px; }
  .twk-hint { font-size: 11px; color: var(--muted-2); margin-top: 6px; }

  /* density */
  body.density-cozy .jgrid tbody tr { height: 42px; }
  body.density-cozy .var-c .jgrid tbody tr { height: 44px; }
  body.density-cozy .dash { padding: 32px; }
  body.density-cozy .lesson-row,
  body.density-cozy .work-item,
  body.density-cozy .grp-card { padding-top: 15px; padding-bottom: 15px; }
</style>
</head>
<body>

<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 5.5 10 2l7 3.5L10 9 3 5.5z" fill="#fff"/><path d="M6 8v3.5c0 1.2 1.8 2.2 4 2.2s4-1 4-2.2V8" stroke="#fff" stroke-width="1.4" fill="none"/></svg>
      </div>
      <div>
        <div class="brand-name">Класс<span>Журнал</span></div>
        <div class="brand-sub">Кабинет преподавателя</div>
      </div>
    </div>

    <div class="side-scroll">
      <div class="nav-label">Меню</div>
      <div class="nav-item" data-go="dashboard">
        <span class="ni-ico"><svg width="19" height="19" viewBox="0 0 20 20" fill="none"><path d="M3 9.5 10 4l7 5.5M5 8.5V16h10V8.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        Главная
      </div>
      <div class="nav-item" data-go="journal">
        <span class="ni-ico"><svg width="19" height="19" viewBox="0 0 20 20" fill="none"><rect x="3" y="3.5" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 7.5h14M8 7.5v9" stroke="currentColor" stroke-width="1.6"/></svg></span>
        Журнал
      </div>
      <div class="nav-item" data-go="ktp">
        <span class="ni-ico"><svg width="19" height="19" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 8h14M7 2.5v3M13 2.5v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
        КТП и расписание
      </div>

      <div class="nav-label">Мои группы</div>
      <div class="group-item active" data-grp="10a">
        <span class="group-chip" style="background:#3b5bdb">10А</span>
        <div class="group-meta"><div class="group-name">10 «А»</div><div class="group-sub">Информатика · 16 уч.</div></div>
      </div>
      <div class="group-item" data-grp="10b">
        <span class="group-chip" style="background:#0ca678">10Б</span>
        <div class="group-meta"><div class="group-name">10 «Б»</div><div class="group-sub">Информатика · 15 уч.</div></div>
      </div>
      <div class="group-item" data-grp="11a">
        <span class="group-chip" style="background:#7048e8">11А</span>
        <div class="group-meta"><div class="group-name">11 «А»</div><div class="group-sub">Информатика · 14 уч.</div></div>
      </div>
      <div class="group-item" data-grp="9v">
        <span class="group-chip" style="background:#f08c00">9В</span>
        <div class="group-meta"><div class="group-name">9 «В»</div><div class="group-sub">Информатика · 18 уч.</div></div>
      </div>
    </div>

    <div class="side-user">
      <div class="avatar">АС</div>
      <div class="su-meta">
        <div class="su-name">Антон Сергеевич</div>
        <div class="su-role">Преподаватель</div>
      </div>
      <button class="icon-ghost" title="Настройки" onclick="toast('Настройки профиля')">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2.4" stroke="currentColor" stroke-width="1.5"/><path d="M10 3v2M10 15v2M3 10h2M15 10h2M5 5l1.4 1.4M13.6 13.6 15 15M15 5l-1.4 1.4M6.4 13.6 5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main">
    <header class="topbar">
      <div class="tb-titles">
        <div class="tb-crumb" id="tbCrumb">Кабинет преподавателя</div>
        <div class="tb-title" id="tbTitle">Главная</div>
      </div>
      <span class="tb-spacer"></span>
      <button class="icon-ghost" title="Уведомления" onclick="toast('Уведомлений нет')" style="position:relative">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 3a4 4 0 0 0-4 4c0 4-1.5 5-1.5 5h11S14 11 14 7a4 4 0 0 0-4-4zM8.5 15a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </header>

    <div class="stage">
      <section class="screen active" data-screen="dashboard"></section>
      <section class="screen" data-screen="journal"></section>
      <section class="screen" data-screen="ktp"></section>
    </div>
  </div>
</div>

<!-- shared overlays -->
<div class="ctx-backdrop" id="ctxBackdrop"></div>
<div class="ctx-menu" id="ctxMenu"></div>
<div class="grade-pop" id="gradePop"></div>
<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M4 10.5 8 14l8-8.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span>Готово</span>
</div>

<!-- thumbnail for offline bundling -->
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#3b5bdb"/>
    <g transform="translate(30,30)">
      <rect x="0" y="0" width="40" height="40" rx="4" fill="#fff"/>
      <rect x="0" y="0" width="40" height="11" rx="4" fill="#dde3fb"/>
      <line x1="14" y1="0" x2="14" y2="40" stroke="#c7cdf0" stroke-width="1.5"/>
      <line x1="0" y1="22" x2="40" y2="22" stroke="#eef0fb" stroke-width="1.5"/>
      <circle cx="24" cy="16.5" r="2.4" fill="#2f9e44"/>
      <circle cx="33" cy="16.5" r="2.4" fill="#e03131"/>
      <circle cx="24" cy="31" r="2.4" fill="#f08c00"/>
      <circle cx="33" cy="31" r="2.4" fill="#7048e8"/>
    </g>
  </svg>
</template>

<script src="cabinet-data.js"></script>
<script src="cabinet-journal.js"></script>
<script src="cabinet-dashboard.js"></script>
<script src="cabinet-ktp.js"></script>
<script src="cabinet-app.js"></script>
</body>
</html>
